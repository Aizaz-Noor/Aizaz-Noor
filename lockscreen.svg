<svg viewBox="0 0 400 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <!-- bezel -->
  <rect x="0" y="0" width="400" height="760" rx="56" fill="#000000"/>
  <!-- screen -->
  <rect x="10" y="10" width="380" height="740" rx="48" fill="url(#screenBg)"/>
  <!-- ambient glow -->
  <circle cx="320" cy="80" r="140" fill="url(#glow)"/>

  <!-- notch -->
  <rect x="150" y="10" width="100" height="26" rx="13" fill="#000000"/>

  <!-- time -->
  <text x="200" y="150" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="600" fill="#f8fafc">9:41</text>
  <text x="200" y="182" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#94a3b8">Wednesday, July 8</text>

  <!-- lock icon -->
  <g transform="translate(188,198)">
    <rect x="0" y="8" width="24" height="18" rx="4" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <path d="M4 8 V4 a8 8 0 0 1 16 0 V8" fill="none" stroke="#94a3b8" stroke-width="2"/>
  </g>

  <!-- Notification 1: Messages -->
  <g filter="url(#cardShadow)">
    <rect x="28" y="250" width="344" height="86" rx="20" fill="url(#cardFill)"/>
  </g>
  <circle cx="66" cy="284" r="18" fill="#22c55e"/>
  <text x="66" y="290" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#ffffff">💬</text>
  <text x="92" y="279" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#e2e8f0" letter-spacing="0.5">MESSAGES</text>
  <text x="346" y="279" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">now</text>
  <text x="92" y="300" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#cbd5e1">Aizaz: "Scroll down, I'll show you</text>
  <text x="92" y="318" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#cbd5e1">what I've actually built 👇"</text>

  <!-- Notification 2: GitHub -->
  <g filter="url(#cardShadow)">
    <rect x="28" y="350" width="344" height="86" rx="20" fill="url(#cardFill)"/>
  </g>
  <circle cx="66" cy="384" r="18" fill="#38bdf8"/>
  <text x="66" y="390" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#0d1117">🐙</text>
  <text x="92" y="379" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#e2e8f0" letter-spacing="0.5">GITHUB</text>
  <text x="346" y="379" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">2m ago</text>
  <text x="92" y="400" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#cbd5e1">ANK-CINEMA v3.0.1 · CI passing</text>
  <text x="92" y="418" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#cbd5e1">on 9 platform/version combos ✔</text>

  <!-- Notification 3: Mail -->
  <g filter="url(#cardShadow)">
    <rect x="28" y="450" width="344" height="86" rx="20" fill="url(#cardFill)"/>
  </g>
  <circle cx="66" cy="484" r="18" fill="#f43f5e"/>
  <text x="66" y="490" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#ffffff">✉️</text>
  <text x="92" y="479" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#e2e8f0" letter-spacing="0.5">MAIL</text>
  <text x="346" y="479" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">1h ago</text>
  <text x="92" y="500" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#cbd5e1">"Open to internships — reply</text>
  <text x="92" y="518" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#cbd5e1">within 24h, always."</text>

  <!-- swipe up hint -->
  <g>
    <path d="M188 660 L200 648 L212 660" stroke="#38bdf8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <text x="200" y="690" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#64748b">swipe up · keep scrolling</text>
  </g>

  <!-- home indicator -->
  <rect x="150" y="726" width="100" height="5" rx="2.5" fill="#475569"/>
</svg>
