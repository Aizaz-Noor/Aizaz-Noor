<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="260" fill="#010409"/>

  <!-- Panel 1: Mission -->
  <rect x="24" y="20" width="360" height="220" rx="16" fill="url(#cardbg)" stroke="#1e293b"/>
  <text x="52" y="58" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#38bdf8" letter-spacing="1">MISSION</text>
  <text x="52" y="96" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e2e8f0">Build the tool I'd</text>
  <text x="52" y="120" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e2e8f0">actually reach for —</text>
  <text x="52" y="144" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e2e8f0">then ship it tested,</text>
  <text x="52" y="168" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e2e8f0">documented, and real.</text>
  <text x="52" y="210" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#64748b">learning in public since 2025</text>

  <!-- Panel 2: Principles -->
  <rect x="404" y="20" width="360" height="220" rx="16" fill="url(#cardbg)" stroke="#1e293b"/>
  <text x="432" y="58" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#38bdf8" letter-spacing="1">PRINCIPLES</text>
  <text x="432" y="90" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#cbd5e1">→ CI on every commit, no exceptions</text>
  <text x="432" y="118" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#cbd5e1">→ Human approval gates on AI agents</text>
  <text x="432" y="146" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#cbd5e1">→ Parallel over sequential, always</text>
  <text x="432" y="174" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#cbd5e1">→ If it's not tested, it's not shipped</text>
  <text x="432" y="202" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#cbd5e1">→ Reply within 24 hours, always</text>

  <!-- Panel 3: Stack Radar -->
  <rect x="784" y="20" width="392" height="220" rx="16" fill="url(#cardbg)" stroke="#1e293b"/>
  <text x="812" y="58" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#38bdf8" letter-spacing="1">FOCUS AREAS</text>

  <!-- radar chart: 5-axis pentagon, center at (980,148), radius 78 -->
  <g stroke="#1e293b" fill="none" stroke-width="1">
    <polygon points="980,72 1050,120 1023,198 937,198 910,120"/>
    <polygon points="980,102 1030,132 1013,183 947,183 930,132"/>
    <polygon points="980,132 1010,144 1003,168 957,168 950,144"/>
  </g>
  <!-- data polygon: CLI 0.9, AI 0.85, DSA 0.7, Systems 0.6, Testing 0.75 -->
  <polygon points="980,79 1041,124 1011,187 949,190 923,127" fill="#38bdf8" fill-opacity="0.28" stroke="#38bdf8" stroke-width="2"/>

  <text x="980" y="62" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">CLI</text>
  <text x="1060" y="122" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">AI Pipelines</text>
  <text x="1023" y="216" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">Testing/CI</text>
  <text x="937" y="216" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">Systems</text>
  <text x="900" y="122" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">DSA</text>
</svg>
