<svg viewBox="0 0 1200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxbg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="240" fill="#010409"/>

  <text x="24" y="34" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#38bdf8" letter-spacing="1">AGENT-STARTUP-SKILLS — 8-PHASE PIPELINE</text>

  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#cbd5e1">
    <!-- 8 small boxes evenly spaced -->
    <!-- box width 128, gap 16, start x=24 -->
  </g>

  <!-- generate boxes programmatically-equivalent, hand placed -->
  <g>
    <!-- box 1 -->
    <rect x="24" y="70" width="128" height="70" rx="10" fill="url(#boxbg2)" stroke="#1e293b"/>
    <text x="88" y="100" text-anchor="middle" font-size="11.5" fill="#e2e8f0" font-family="Helvetica, Arial, sans-serif">Market</text>
    <text x="88" y="116" text-anchor="middle" font-size="11.5" fill="#e2e8f0" font-family="Helvetica, Arial, sans-serif">Scout</text>

    <rect x="168" y="70" width="128" height="70" rx="10" fill="url(#boxbg2)" stroke="#1e293b"/>
    <text x="232" y="100" text-anchor="middle" font-size="11.5" fill="#e2e8f0" font-family="Helvetica, Arial, sans-serif">MVP</text>
    <text x="232" y="116" text-anchor="middle" font-size="11.5" fill="#e2e8f0" font-family="Helvetica, Arial, sans-serif">Scoper</text>

    <rect x="312" y="70" width="128" height="70" rx="10" fill="url(#boxbg2)" stroke="#1e293b"/>
    <text x="376" y="108" text-anchor="middle" font-size="11.5" fill="#e2e8f0" font-family="Helvetica, Arial, sans-serif">Architect</text>

    <rect x="456" y="70" width="128" height="70" rx="10" fill="url(#boxbg2)" stroke="#1e293b"/>
    <text x="520" y="100" text-anchor="middle" font-size="11.5" fill="#e2e8f0" font-family="Helvetica, Arial, sans-serif">Schema</text>
    <text x="520" y="116" text-anchor="middle" font-size="11.5" fill="#e2e8f0" font-family="Helvetica, Arial, sans-serif">Designer</text>

    <rect x="600" y="70" width="128" height="70" rx="10" fill="url(#boxbg2)" stroke="#1e293b"/>
    <text x="664" y="108" text-anchor="middle" font-size="11.5" fill="#e2e8f0" font-family="Helvetica, Arial, sans-serif">Coder</text>

    <rect x="744" y="70" width="128" height="70" rx="10" fill="url(#boxbg2)" stroke="#1e293b"/>
    <text x="808" y="100" text-anchor="middle" font-size="11.5" fill="#e2e8f0" font-family="Helvetica, Arial, sans-serif">Test</text>
    <text x="808" y="116" text-anchor="middle" font-size="11.5" fill="#e2e8f0" font-family="Helvetica, Arial, sans-serif">Engineer</text>

    <rect x="888" y="70" width="128" height="70" rx="10" fill="url(#boxbg2)" stroke="#f59e0b"/>
    <text x="952" y="100" text-anchor="middle" font-size="11.5" fill="#fbbf24" font-family="Helvetica, Arial, sans-serif">Security</text>
    <text x="952" y="116" text-anchor="middle" font-size="11.5" fill="#fbbf24" font-family="Helvetica, Arial, sans-serif">Auditor</text>

    <rect x="1032" y="70" width="144" height="70" rx="10" fill="#0f172a" stroke="#38bdf8"/>
    <text x="1104" y="100" text-anchor="middle" font-size="11.5" fill="#38bdf8" font-family="Helvetica, Arial, sans-serif">Deploy</text>
    <text x="1104" y="116" text-anchor="middle" font-size="11.5" fill="#38bdf8" font-family="Helvetica, Arial, sans-serif">Planner</text>
  </g>

  <!-- approval gate marks between each box -->
  <g font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#f59e0b">
    <text x="160" y="110" text-anchor="middle">⏸</text>
    <text x="304" y="110" text-anchor="middle">⏸</text>
    <text x="448" y="110" text-anchor="middle">⏸</text>
    <text x="592" y="110" text-anchor="middle">⏸</text>
    <text x="736" y="110" text-anchor="middle">⏸</text>
    <text x="880" y="110" text-anchor="middle">⏸</text>
    <text x="1024" y="110" text-anchor="middle">⏸</text>
  </g>

  <!-- pulse on the currently-active gate as an example -->
  <circle cx="880" cy="105" r="12" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="8;18;8" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <text x="600" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8">Every ⏸ is a mandatory human approval gate — nothing moves forward without your sign-off.</text>
  <text x="600" y="204" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#475569">one-command install via npx · includes a dedicated OWASP security-audit phase</text>
</svg>
