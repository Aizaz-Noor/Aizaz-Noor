<svg viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="220" fill="#010409"/>

  <text x="24" y="34" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#38bdf8" letter-spacing="1">ANK-CINEMA — REQUEST PIPELINE</text>

  <!-- boxes -->
  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="24" y="70" width="200" height="90" rx="12" fill="url(#boxbg)" stroke="#1e293b"/>
    <text x="124" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">Parallel Search</text>
    <text x="124" y="128" text-anchor="middle" font-size="11" fill="#64748b">2 sources ·</text>
    <text x="124" y="144" text-anchor="middle" font-size="11" fill="#64748b">ThreadPoolExecutor</text>

    <rect x="284" y="70" width="200" height="90" rx="12" fill="url(#boxbg)" stroke="#1e293b"/>
    <text x="384" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">Dedup</text>
    <text x="384" y="128" text-anchor="middle" font-size="11" fill="#64748b">by info-hash,</text>
    <text x="384" y="144" text-anchor="middle" font-size="11" fill="#64748b">cross-source</text>

    <rect x="544" y="70" width="200" height="90" rx="12" fill="url(#boxbg)" stroke="#1e293b"/>
    <text x="644" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">Magnet Enrich</text>
    <text x="644" y="128" text-anchor="middle" font-size="11" fill="#64748b">16 trackers</text>
    <text x="644" y="144" text-anchor="middle" font-size="11" fill="#64748b">appended</text>

    <rect x="804" y="70" width="200" height="90" rx="12" fill="url(#boxbg)" stroke="#1e293b"/>
    <text x="904" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">aria2c Download</text>
    <text x="904" y="128" text-anchor="middle" font-size="11" fill="#64748b">resumable,</text>
    <text x="904" y="144" text-anchor="middle" font-size="11" fill="#64748b">self-healing DNS</text>

    <rect x="1004" y="70" width="172" height="90" rx="12" fill="#0f172a" stroke="#38bdf8"/>
    <text x="1090" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#38bdf8">Your File</text>
    <text x="1090" y="132" text-anchor="middle" font-size="11" fill="#64748b">cross-platform</text>
  </g>

  <!-- arrows -->
  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M224 115 H284"/>
    <path d="M484 115 H544"/>
    <path d="M744 115 H804"/>
    <path d="M1004 115 H1004"/>
  </g>
  <path d="M964 115 H1004" stroke="#334155" stroke-width="2" fill="none"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>

  <!-- animated flow dot travelling the whole path -->
  <circle r="5" fill="#38bdf8">
    <animateMotion dur="4s" repeatCount="indefinite"
      path="M24,115 H1176" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <text x="1090" y="195" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#475569">9 platform/Python combos verified in CI · 18 unit tests</text>
</svg>
